site_name: Mi Documentación

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand


nav:
  - Inicio: index.md
  - Python:
      - Introducción: Python/index.md
  - JavaScript:
      - 01. Introducción (T1): JavaScript/T1_introduccion.md
      - 02. Funciones (T2): JavaScript/T2_funciones.md
      - 03. Arrays (T3): JavaScript/T3_arrays.md
      - 04. DOM (T4): JavaScript/T4_DOM.md
      - 05. Eventos (T5): JavaScript/T5_eventos.md
      - 06. Formularios (T6): JavaScript/T6_formularios.md
  - PHP:
      - Introducción: PHP/index.md
  - SQL:
      - Introducción: SQL/index.md

plugins:
  - search:
      lang: 
        - es
        - en
      separator: '[\s\-]+'

markdown_extensions:
  - admonition
  - toc:
      permalink: true
