site_name: Mi Documentación
docs_dir: docs
site_description: Documentación de mis apuntes y proyectos
site_author: Tu Nombre


theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
icon:
    logo: material/book


nav:
  - Inicio: index.md
  - Créditos: creditos.md
  - Prueba: prueba.md
  - Python:
      - Introducción: Python/index.md
  - JavaScript:
      - Inicio: JavaScript/index.md
      - Introducción (T1): JavaScript/T1_introduccion.md
      - Funciones (T2): JavaScript/T2_funciones.md
      - Arrays (T3): JavaScript/T3_arrays.md
      - DOM (T4): JavaScript/T4_DOM.md
      - Eventos (T5): JavaScript/T5_eventos.md
      - Formularios (T6): JavaScript/T6_formularios.md
  - PHP:
      - Introducción: PHP/index.md
  - SQL:
      - Introducción: SQL/index.md

plugins:
  - search:
      lang:
        - es
        - en
      separator: '[\s\-]+'

prebuild_index: true

markdown_extensions:
  - admonition
  - toc:
      permalink: true
