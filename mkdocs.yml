site_name: Mi Documentación

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand


nav:
  - Inicio: index.md
  - Python:
      - Introducción: Python/index.md
  - JavaScript:
      - index.md
      - T1_introduccion.md
      - T2_funciones.md
      - T3_arrays.md
      - T4_DOM.md
      - T5_eventos.md
      - T6_formularios.md
  - PHP:
      - Introducción: PHP/index.md
  - SQL:
      - Introducción: SQL/index.md

plugins:
  - search:
      lang: 
        - es
        - en
      separator: '[\s\-]+'

markdown_extensions:
  - admonition
  - toc:
      permalink: true
